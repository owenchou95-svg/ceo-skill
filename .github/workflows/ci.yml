name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s scripts -p 'test_*.py'
      - name: Validate contract drift
        run: python scripts/validate_contract_drift.py
      - name: Validate structured fixtures
        run: python scripts/validate_eval_fixtures.py references/eval-fixtures.json
      - name: Verify simulated multi-agent install
        run: python scripts/verify_multi_agent_install.py
      - name: Smoke inventory routing
        run: python scripts/skill_inventory.py --request "我想做一个产品但不确定是否值得做，请帮我想清楚方向和范围。" --triage clarification --format json
      - name: Host CLI smoke checks
        run: python scripts/smoke_host_native_cli.py --format json
      - name: Fast synthetic scale benchmark
        run: python scripts/benchmark_skill_inventory_scale.py --sizes 70 --format json
      - name: Fixture live-model sample suite
        run: python scripts/run_live_model_samples.py --mode fixture --timestamp ci
